name: Weekly Curation Trigger

on:
  schedule:
    - cron: "0 7 * * 1"   # jeden Montag 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  open-curation-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create weekly curation issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0,10);
            const title = `Weekly curation ${today}`;
            const body = `
            Please review this repository and propose a curated update.

            Scope:
            - Check for dead links
            - Identify strong new sources from priority institutions and market infrastructure providers
            - Improve consistency of wording
            - Prefer conservative changes to README
            - Put uncertain additions into candidates.md

            Please create a draft PR, not a direct merge.
            `;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
